name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "rcmdcheck",
            "ggplot2",
            "testthat",
            "knitr",
            "rmarkdown",
            "pkgdown",
            "survival"
          ))

      - name: Check package
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(
            args = "--no-manual",
            error_on = "warning"
          )
